<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - MesaLista</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background-color: var(--color-light-cream);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 0;
        }
        .auth-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            background-color: #fff;
        }
        .auth-header {
            background-color: var(--color-coffee-dark);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .auth-body {
            padding: 2.5rem;
        }
        .form-control, .form-select {
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            border: 1px solid #dee2e6;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--color-wine);
            box-shadow: 0 0 0 0.25rem rgba(114, 47, 55, 0.25);
        }
        .btn-auth {
            background-color: var(--color-wine);
            color: white;
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-weight: 500;
            width: 100%;
            transition: all 0.3s ease;
        }
        .btn-auth:hover {
            background-color: var(--color-coffee-dark);
            color: white;
        }
        .auth-link {
            color: var(--color-wine);
            text-decoration: none;
            font-weight: 500;
        }
        .auth-link:hover {
            color: var(--color-coffee-dark);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-7">
                <!-- Regresar a inicio -->
                <a th:href="@{/}" class="text-decoration-none text-muted mb-3 d-inline-block"><i class="fa-solid fa-arrow-left me-2"></i>Volver al inicio</a>
                
                <div class="card auth-card">
                    <div class="auth-header">
                        <i class="fa-solid fa-utensils text-gold fs-1 mb-2"></i>
                        <h2 class="font-playfair fw-bold mb-0">Únete a MesaLista</h2>
                        <p class="text-white-50 mb-0">La comunidad gastronómica de Sucre</p>
                    </div>
                    <div class="auth-body">
                        
                        <div th:if="${param.success}" class="alert alert-success mb-4">
                            ¡Registro exitoso! Ya puedes iniciar sesión.
                        </div>
                        <div th:if="${error}" class="alert alert-danger mb-4" th:text="${error}">
                            Error en el registro.
                        </div>

                        <form th:action="@{/register}" method="post">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="nombre" class="form-label text-muted small fw-bold">Nombre</label>
                                    <input type="text" class="form-control" id="nombre" name="nombre" required>
                                </div>
                                <div class="col-md-6 mt-3 mt-md-0">
                                    <label for="apellido" class="form-label text-muted small fw-bold">Apellido</label>
                                    <input type="text" class="form-control" id="apellido" name="apellido" required>
                                </div>
                            </div>
                            
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="email" class="form-label text-muted small fw-bold">Correo Electrónico</label>
                                    <input type="email" class="form-control" id="email" name="email" required>
                                </div>
                                <div class="col-md-6 mt-3 mt-md-0">
                                    <label for="telefono" class="form-label text-muted small fw-bold">Teléfono</label>
                                    <input type="tel" class="form-control" id="telefono" name="telefono" required>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="password" class="form-label text-muted small fw-bold">Contraseña</label>
                                    <input type="password" class="form-control" id="password" name="password" required>
                                </div>
                                <div class="col-md-6 mt-3 mt-md-0">
                                    <label for="confirmPassword" class="form-label text-muted small fw-bold">Confirmar Contraseña</label>
                                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="rol" class="form-label text-muted small fw-bold">Tipo de Cuenta</label>
                                <select class="form-select" id="rol" name="rol" required>
                                    <option value="" selected disabled>Selecciona cómo quieres usar MesaLista</option>
                                    <option value="CLIENTE">Soy Cliente (Quiero buscar y reservar mesas)</option>
                                    <option value="ALIADO_GASTRONOMICO">Soy Aliado Gastronómico (Tengo un local)</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-auth mb-3">Crear Cuenta</button>
                        </form>
                        <div class="text-center mt-3">
                            <span class="text-muted small">¿Ya tienes cuenta?</span> <a th:href="@{/login}" class="auth-link small">Inicia sesión aquí</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
