<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pedidos - MesaLista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

    <!-- Navbar Simple -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-wine">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="fa-solid fa-utensils me-2 text-gold"></i> MesaLista
            </a>
            <div class="ms-auto d-flex gap-2">
                <a href="/cliente/panel" class="btn btn-outline-light"><i class="fa-solid fa-arrow-left me-2"></i>Volver al Panel</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="font-playfair fw-bold text-center mb-4">Mi Historial de Pedidos</h2>

        <div th:if="${pedidos == null or pedidos.isEmpty()}" class="text-center py-5">
            <i class="fa-solid fa-basket-shopping fa-4x text-muted mb-3 opacity-25"></i>
            <h5 class="text-muted">Aún no has realizado ningún pedido.</h5>
            <p class="text-muted small">Explora nuestros locales y anímate a pedir algo delicioso.</p>
            <a href="/" class="btn btn-wine mt-3">Explorar MesaLista</a>
        </div>

        <div class="row g-4" th:if="${pedidos != null and !pedidos.isEmpty()}">
            <div class="col-md-6 col-lg-4" th:each="pedido : ${pedidos}">
                <div class="card border-0 shadow-sm rounded-4 h-100">
                    <div class="card-header bg-white border-0 pt-4 pb-0 d-flex justify-content-between align-items-center">
                        <span class="badge rounded-pill px-3 py-2"
                              th:classappend="${pedido.estadoPedido.name() == 'PENDIENTE' ? 'bg-warning text-dark' : 
                                             (pedido.estadoPedido.name() == 'ACEPTADO' ? 'bg-success' : 'bg-danger')}"
                              th:text="${pedido.estadoPedido.displayName}">Estado</span>
                        <small class="text-muted" th:text="${#temporals.format(pedido.fechaCreacion, 'dd/MM/yyyy HH:mm')}">Fecha</small>
                    </div>
                    <div class="card-body">
                        <h5 class="card-title font-playfair fw-bold mb-1" th:text="${pedido.producto.titulo}">Producto</h5>
                        <p class="text-wine mb-3 small"><i class="fa-solid fa-store me-1"></i> <span th:text="${pedido.local.nombre}">Local</span></p>
                        
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted small">Cantidad:</span>
                            <span class="fw-semibold" th:text="${pedido.cantidad}">1</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted small">Precio Unitario:</span>
                            <span class="fw-semibold" th:text="'Bs. ' + ${pedido.precioUnitario}">Bs. 0</span>
                        </div>
                        <hr class="my-2">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="fw-bold">Total:</span>
                            <span class="text-wine fw-bold fs-5" th:text="'Bs. ' + ${pedido.total}">Bs. 0</span>
                        </div>
                        <div class="mt-3 bg-light p-2 rounded" th:if="${pedido.observacion != null and !pedido.observacion.isEmpty()}">
                            <small class="text-muted d-block fw-semibold mb-1">Tu observación:</small>
                            <small th:text="${pedido.observacion}"></small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
