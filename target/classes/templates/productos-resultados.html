<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados de Búsqueda - MesaLista</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome para íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Estilos Personalizados -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

    <!-- Navbar Minimalista -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-premium shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="fa-solid fa-utensils text-gold me-2"></i>
                <span class="fw-bold fs-4">MesaLista</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <a th:href="@{/login}" class="btn btn-outline-light btn-sm rounded px-3">Iniciar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="mb-4 d-flex justify-content-between align-items-center">
            <h2 class="fw-bold">
                Resultados para: <span class="text-wine" th:text="${keyword != null ? keyword : 'Todos los productos'}"></span>
            </h2>
            <a href="/" class="btn btn-outline-secondary"><i class="fa-solid fa-arrow-left me-2"></i>Volver</a>
        </div>

        <div th:if="${productos.empty}" class="alert alert-warning text-center">
            <i class="fa-solid fa-face-frown fs-4 mb-2"></i><br>
            No se encontraron productos, locales o categorías que coincidan con tu búsqueda.
        </div>

        <div class="row g-4" th:if="${!productos.empty}">
            <div class="col-md-6 col-lg-4" th:each="p : ${productos}">
                <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden">
                    <img th:src="${p.imagenUrl != null ? p.imagenUrl : 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&q=80&w=500'}" class="card-img-top" alt="Producto" style="height: 200px; object-fit: cover;">
                    <div class="card-body">
                        <span class="badge bg-gold mb-2" th:text="${p.categoria.displayName}">Categoría</span>
                        <h5 class="card-title fw-bold" th:text="${p.titulo}">Título del Producto</h5>
                        <p class="card-text text-muted small" th:text="${p.descripcion}">Descripción</p>
                        <p class="card-text">
                            <strong>Local:</strong> <span th:text="${p.usuarioOfertante.nombre + ' ' + p.usuarioOfertante.apellido}">Local</span>
                        </p>
                    </div>
                    <div class="card-footer bg-white border-0 d-flex justify-content-between align-items-center pb-3">
                        <span class="fs-5 fw-bold text-wine">Bs. <span th:text="${p.precio}">0.00</span></span>
                        <button class="btn btn-primary-custom btn-sm rounded-pill px-3">Pedir</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
