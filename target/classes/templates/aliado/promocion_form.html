<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Promoción - MesaLista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body class="dashboard-body">

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <a href="/" class="sidebar-brand"><i class="fa-solid fa-utensils"></i><span>MesaLista</span></a>
        <button class="sidebar-close d-lg-none" id="sidebarClose"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="sidebar-user">
        <div class="user-avatar"><i class="fa-solid fa-store"></i></div>
        <div class="user-info">
            <span class="user-name" sec:authentication="name">aliado</span>
            <span class="user-role">Aliado Gastronómico</span>
        </div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section-title">Principal</div>
        <a href="/aliado/panel" class="sidebar-link"><i class="fa-solid fa-house"></i><span>Resumen</span></a>
        <a href="/aliado/promociones" class="sidebar-link active"><i class="fa-solid fa-tags"></i><span>Promociones</span></a>
    </nav>
</aside>

<div class="dashboard-main">
    <header class="dashboard-topbar">
        <button class="topbar-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
        <div class="topbar-title">
            <a href="/aliado/promociones" class="text-decoration-none text-muted"><i class="fa-solid fa-arrow-left me-2"></i>Volver a Promociones</a>
        </div>
    </header>

    <div class="dashboard-content">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="dash-card">
                    <div class="dash-card__header border-0 pb-0">
                        <h4 class="dash-card__title" th:text="${promocion.id == null ? 'Nueva Promoción' : 'Editar Promoción'}">Nueva Promoción</h4>
                        <p class="small text-muted mb-0">Atrae clientes con combos o descuentos. Recuerda que será revisada por un administrador.</p>
                    </div>
                    <div class="dash-card__body p-4">
                        <form th:action="@{/aliado/promociones/guardar}" th:object="${promocion}" method="post">
                            <input type="hidden" th:field="*{id}">
                            
                            <div class="mb-3">
                                <label for="titulo" class="form-label fw-semibold">Título de la Promoción</label>
                                <input type="text" class="form-control" id="titulo" th:field="*{titulo}" placeholder="Ej: Especial Día de la Madre - 2x1" required>
                            </div>

                            <div class="mb-3">
                                <label for="descripcion" class="form-label fw-semibold">Descripción</label>
                                <textarea class="form-control" id="descripcion" th:field="*{descripcion}" rows="3" placeholder="Detalla qué incluye la promoción y sus condiciones." required></textarea>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-md-4">
                                    <label for="porcentajeDescuento" class="form-label fw-semibold">Descuento (%)</label>
                                    <div class="input-group">
                                        <input type="number" class="form-control" id="porcentajeDescuento" th:field="*{porcentajeDescuento}" min="0" max="100" placeholder="Ej: 20">
                                        <span class="input-group-text">%</span>
                                    </div>
                                    <div class="form-text small">Dejar en blanco si no aplica.</div>
                                </div>
                                <div class="col-md-4">
                                    <label for="fechaInicio" class="form-label fw-semibold">Válido Desde</label>
                                    <input type="date" class="form-control" id="fechaInicio" th:field="*{fechaInicio}" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="fechaFin" class="form-label fw-semibold">Válido Hasta</label>
                                    <input type="date" class="form-control" id="fechaFin" th:field="*{fechaFin}" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="imagenUrl" class="form-label fw-semibold">URL de la Imagen (Opcional)</label>
                                <input type="url" class="form-control" id="imagenUrl" th:field="*{imagenUrl}" placeholder="https://ejemplo.com/promo.jpg">
                            </div>

                            <div class="d-flex justify-content-end gap-2 mt-4">
                                <a href="/aliado/promociones" class="btn btn-light rounded-pill px-4">Cancelar</a>
                                <button type="submit" class="btn btn-wine rounded-pill px-4">
                                    <i class="fa-solid fa-paper-plane me-2"></i>Guardar y Enviar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
