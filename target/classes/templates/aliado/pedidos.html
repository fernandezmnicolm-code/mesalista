<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos Recibidos - MesaLista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-wine">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="fa-solid fa-utensils me-2 text-gold"></i> Panel Aliado
            </a>
            <div class="ms-auto d-flex gap-2">
                <a href="/aliado/panel" class="btn btn-outline-light"><i class="fa-solid fa-arrow-left me-2"></i>Volver al Panel</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="font-playfair fw-bold text-center mb-4">Gestión de Pedidos</h2>

        <div th:if="${exito}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fa-solid fa-check-circle me-2"></i><span th:text="${exito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fa-solid fa-triangle-exclamation me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${pedidos == null or pedidos.isEmpty()}" class="text-center py-5 bg-white shadow-sm rounded-4">
            <i class="fa-solid fa-clipboard-list fa-4x text-muted mb-3 opacity-25"></i>
            <h5 class="text-muted">No tienes pedidos registrados.</h5>
            <p class="text-muted small">Los pedidos de tus clientes aparecerán aquí.</p>
        </div>

        <div class="table-responsive bg-white shadow-sm rounded-4 p-3" th:if="${pedidos != null and !pedidos.isEmpty()}">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Fecha</th>
                        <th>Cliente</th>
                        <th>Producto</th>
                        <th>Cant.</th>
                        <th>Total</th>
                        <th>Observación</th>
                        <th>Estado</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="pedido : ${pedidos}">
                        <td th:text="${#temporals.format(pedido.fechaCreacion, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <strong th:text="${pedido.cliente.nombre} + ' ' + ${pedido.cliente.apellido}">Cliente</strong><br>
                            <small class="text-muted" th:text="${pedido.cliente.email}">email</small>
                        </td>
                        <td th:text="${pedido.producto.titulo}">Producto</td>
                        <td class="text-center" th:text="${pedido.cantidad}">1</td>
                        <td class="text-wine fw-bold" th:text="'Bs. ' + ${pedido.total}">Bs. 0</td>
                        <td><small class="text-muted" th:text="${pedido.observacion != null ? pedido.observacion : 'Ninguna'}"></small></td>
                        <td>
                            <span class="badge rounded-pill"
                                  th:classappend="${pedido.estadoPedido.name() == 'PENDIENTE' ? 'bg-warning text-dark' : 
                                                 (pedido.estadoPedido.name() == 'ACEPTADO' ? 'bg-success' : 'bg-danger')}"
                                  th:text="${pedido.estadoPedido.displayName}">Estado</span>
                        </td>
                        <td class="text-end">
                            <div th:if="${pedido.estadoPedido.name() == 'PENDIENTE'}" class="d-flex gap-2 justify-content-end">
                                <form th:action="@{/aliado/pedidos/{id}/aceptar(id=${pedido.id})}" method="post">
                                    <button type="submit" class="btn btn-sm btn-success rounded-pill" title="Aceptar">
                                        <i class="fa-solid fa-check"></i>
                                    </button>
                                </form>
                                <form th:action="@{/aliado/pedidos/{id}/rechazar(id=${pedido.id})}" method="post">
                                    <button type="submit" class="btn btn-sm btn-danger rounded-pill" title="Rechazar">
                                        <i class="fa-solid fa-xmark"></i>
                                    </button>
                                </form>
                            </div>
                            <span th:if="${pedido.estadoPedido.name() != 'PENDIENTE'}" class="text-muted small">Atendido</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
