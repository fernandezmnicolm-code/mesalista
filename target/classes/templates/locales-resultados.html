<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar Locales - MesaLista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

    <!-- Navbar Minimalista -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-premium shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="fa-solid fa-utensils text-gold me-2"></i>
                <span class="fw-bold fs-4">MesaLista</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <a th:href="@{/login}" class="btn btn-outline-light btn-sm rounded px-3" sec:authorize="isAnonymous()">Iniciar Sesión</a>
                <a th:href="@{/cliente/panel}" class="btn btn-outline-light btn-sm rounded px-3" sec:authorize="hasRole('CLIENTE')">Mi Panel</a>
                <a th:href="@{/aliado/panel}" class="btn btn-outline-light btn-sm rounded px-3" sec:authorize="hasRole('ALIADO_GASTRONOMICO')">Panel Aliado</a>
                <a th:href="@{/admin/dashboard}" class="btn btn-outline-light btn-sm rounded px-3" sec:authorize="hasRole('ADMINISTRADOR')">Panel Admin</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="mb-5 d-flex justify-content-between align-items-center">
            <h2 class="fw-bold" style="font-family: 'Playfair Display', serif; color: #3e2723;">
                <span th:if="${keyword != null}">Resultados para: <span class="text-wine" th:text="${keyword}"></span></span>
                <span th:if="${keyword == null}">Explorar Locales Gastronómicos</span>
            </h2>
            <a href="/" class="btn btn-outline-secondary rounded-pill px-4"><i class="fa-solid fa-arrow-left me-2"></i>Volver</a>
        </div>

        <div th:if="${locales == null or locales.isEmpty()}" class="alert alert-warning text-center rounded-4 shadow-sm py-5">
            <i class="fa-solid fa-face-frown fs-1 mb-3 text-muted"></i>
            <h4 class="fw-bold">No encontramos locales</h4>
            <p class="mb-0">No hay restaurantes o cafeterías que coincidan con tu búsqueda.</p>
        </div>

        <div class="row g-4" th:if="${locales != null and !locales.isEmpty()}">
            <div class="col-md-6 col-lg-4" th:each="local : ${locales}">
                <a th:href="@{/restaurante/{id}(id=${local.id})}" class="text-decoration-none text-dark">
                    <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden local-card" style="transition: transform 0.3s ease, box-shadow 0.3s ease;">
                        <div class="position-relative">
                            <img th:src="${local.portadaUrl != null ? local.portadaUrl : 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&q=80&w=800'}" 
                                 class="card-img-top" alt="Portada Restaurante" 
                                 style="height: 220px; object-fit: cover;"
                                 onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&q=80&w=800';">
                            <div class="position-absolute bottom-0 start-0 w-100 p-3" style="background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);">
                                <span class="badge bg-gold px-3 py-2 rounded-pill fs-6 shadow-sm"><i class="fa-solid fa-star me-1"></i> 4.5</span>
                            </div>
                        </div>
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h4 class="card-title fw-bold text-wine mb-0" th:text="${local.nombre}">Nombre del Local</h4>
                            </div>
                            <p class="text-muted small fw-semibold mb-3"><i class="fa-solid fa-utensils me-2"></i><span th:text="${local.tipoLocal}">Tipo</span></p>
                            
                            <p class="card-text text-muted mb-3" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;" th:text="${local.descripcion}">
                                Descripción del local.
                            </p>
                            
                            <hr class="opacity-25 my-3">
                            
                            <div class="d-flex justify-content-between align-items-center text-muted small mb-3">
                                <span><i class="fa-solid fa-location-dot me-1 text-danger"></i> <span th:text="${#strings.abbreviate(local.direccion, 25)}">Dirección</span></span>
                                <span><i class="fa-solid fa-money-bill-wave me-1 text-success"></i> Bs. 20 - 80</span>
                            </div>
                            
                            <div class="mt-auto pt-2">
                                <span class="btn btn-outline-wine btn-sm rounded-pill w-100 fw-bold">Ver Local</span>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <style>
        .local-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1) !important;
        }
        .text-wine { color: #800020; }
        .bg-gold { background-color: #D4AF37; color: #fff; }
        .bg-premium { background-color: #2c1e16; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
